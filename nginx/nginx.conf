events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # === petervel.nl ===
    server {
        listen 80;
        listen [::]:80;
        server_name petervel.nl;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name petervel.nl;

        ssl_certificate /etc/letsencrypt/live/petervel.nl/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/petervel.nl/privkey.pem;

        location / {
            proxy_pass http://petervel-frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            proxy_pass http://petervel-backend:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # === books.petervel.nl ===
    server {
        listen 80;
        listen [::]:80;
        server_name books.petervel.nl;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name books.petervel.nl;

        ssl_certificate /etc/letsencrypt/live/books.petervel.nl/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/books.petervel.nl/privkey.pem;

        location / {
            proxy_pass http://boox-frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            proxy_pass http://boox-backend:3001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Docker's internal DNS — resolves upstream hostnames lazily at request time
    resolver 127.0.0.11 valid=30s;

    # === petervel.nl ===
    server {
        listen 80;
        listen [::]:80;
        server_name petervel.nl;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name petervel.nl;

        ssl_certificate /etc/letsencrypt/live/petervel.nl/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/petervel.nl/privkey.pem;

        location / {
            set $upstream_auction_frontend auctions-frontend:80;
            proxy_pass http://$upstream_auction_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            set $upstream_auction_api auctions-backend-api:3000;
            proxy_pass http://$upstream_auction_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # === books.petervel.nl ===
    server {
        listen 80;
        listen [::]:80;
        server_name books.petervel.nl;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name books.petervel.nl;

        ssl_certificate /etc/letsencrypt/live/books.petervel.nl/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/books.petervel.nl/privkey.pem;

        location / {
            set $upstream_books_frontend books-frontend:80;
            proxy_pass http://$upstream_books_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            set $upstream_books_api books-backend:3001;
            proxy_pass http://$upstream_books_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
